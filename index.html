<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Video Streaming</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    
    <!-- TELEGRAM WEB APP SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- GOOGLE LOGIN SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='9955574' data-sdk='show_9955574'></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background: #0f0f1a; min-height: 100vh; }
        .modal-overlay { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .scrollable::-webkit-scrollbar { display: none; }
        .scrollable { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 2-COLUMN GRID */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .video-card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .video-card:active { transform: scale(0.97); }
        
        .video-thumbnail {
            position: relative;
            width: 100%;
            height: 120px;
            background: #2a2a4a;
        }
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            opacity: 0.9;
        }
        
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        
        .auth-input {
            width: 100%;
            padding: 16px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        .auth-input:focus { outline: none; border-color: #3b82f6; }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .auth-btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .auth-link { color: #3b82f6; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body class="text-white">
    
    <div class="max-w-md mx-auto min-h-screen">
        
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-[#0f0f1a]/95 backdrop-blur-md border-b border-gray-800 px-4 py-4">
            <div class="flex items-center gap-3">
                <img id="telegramPhoto" src="https://telegram.org/img/t_logo.png" class="w-10 h-10 rounded-full">
                <div>
                    <h1 id="appName" class="text-lg font-bold text-white">VideoStream</h1>
                    <p class="text-xs text-gray-400" id="loginType">Welcome</p>
                </div>
                <button onclick="logout()" id="logoutBtn" class="ml-auto text-red-400 text-sm hidden">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>
        
        <main class="px-4 py-4 pb-6">
            
            <!-- Auth Container -->
            <div id="authContainer" class="auth-container"></div>
            
            <!-- Category Filter -->
            <div class="flex gap-2 mb-4 overflow-x-auto scrollable pb-1 hidden" id="categoryContainer">
                <button class="cat-btn active px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium whitespace-nowrap" data-cat="all">All Videos</button>
            </div>
            
            <!-- Videos Container -->
            <div class="video-grid hidden" id="videosContainer"></div>
        </main>
    </div>
    
    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBuD4oEvO3zgZULZt_5vfRZOwiG43KNb28",
            authDomain: "video-downloader-33366.firebaseapp.com",
            databaseURL: "https://video-downloader-33366-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "video-downloader-33366",
            storageBucket: "video-downloader-33366.firebasestorage.app",
            messagingSenderId: "57159928961",
            appId: "1:57159928961:web:364bb23f6ff53372549180"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentUser = null;
        let videos = [];
        let categories = [];
        let currentCategory = 'all';
        let authMode = 'login';
        let googleClientId = '';
        let googleInitialized = false;
        
        // ============================================
        // AUTH UI RENDER
        // ============================================
        function renderAuthUI() {
            const container = document.getElementById('authContainer');
            
            if (authMode === 'login') {
                container.innerHTML = `
                    <h2 class="text-2xl font-bold text-white mb-2">Welcome back</h2>
                    <p class="text-gray-400 mb-6">Sign in to continue</p>
                    <input type="email" id="loginEmail" placeholder="Email" class="auth-input" autocomplete="email">
                    <input type="password" id="loginPassword" placeholder="Password" class="auth-input" autocomplete="current-password">
                    <button onclick="loginWithEmail()" class="auth-btn">Sign In</button>
                    <p class="text-center text-gray-400 mb-6">
                        Don't have an account? 
                        <a href="#" onclick="switchAuthMode('signup'); return false;" class="auth-link">Sign Up</a>
                    </p>
                    <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-700"></div></div><div class="relative flex justify-center text-sm"><span class="px-3 bg-[#0f0f1a] text-gray-400">or</span></div></div>
                    <button onclick="signInWithGoogle()" class="auth-btn-google" id="googleSignInBtn"><i class="fab fa-google text-blue-500"></i>Sign in with Google</button>
                `;
            } else {
                container.innerHTML = `
                    <h2 class="text-2xl font-bold text-white mb-2">Create account</h2>
                    <p class="text-gray-400 mb-6">Sign up to get started</p>
                    <input type="text" id="signupName" placeholder="Name" class="auth-input" autocomplete="name">
                    <input type="email" id="signupEmail" placeholder="Email" class="auth-input" autocomplete="email">
                    <input type="password" id="signupPassword" placeholder="Password" class="auth-input" autocomplete="new-password">
                    <button onclick="signUpWithEmail()" class="auth-btn">Sign Up</button>
                    <p class="text-center text-gray-400 mb-6">
                        Already have an account? 
                        <a href="#" onclick="switchAuthMode('login'); return false;" class="auth-link">Log In</a>
                    </p>
                    <div class="relative my-6"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-700"></div></div><div class="relative flex justify-center text-sm"><span class="px-3 bg-[#0f0f1a] text-gray-400">or</span></div></div>
                    <button onclick="signInWithGoogle()" class="auth-btn-google" id="googleSignUpBtn"><i class="fab fa-google text-blue-500"></i>Sign up with Google</button>
                `;
            }
        }
        
        function switchAuthMode(mode) { authMode = mode; renderAuthUI(); }
        
        // ============================================
        // GOOGLE & EMAIL AUTH
        // ============================================
        function loadGoogleClientId() {
            db.ref('settings/googleClientId').once('value').then(snap => {
                googleClientId = snap.val() || "";
                if (googleClientId) waitForGoogleSDK();
            });
        }
        function waitForGoogleSDK() { if (typeof google !== 'undefined' && google.accounts) initGoogleSDK(); else setTimeout(waitForGoogleSDK, 300); }
        function initGoogleSDK() {
            if (googleInitialized || !googleClientId) return;
            try {
                google.accounts.id.initialize({ client_id: googleClientId, callback: handleGoogleLogin, auto_select: false, context: 'signin', ux_mode: 'popup' });
                googleInitialized = true;
            } catch(e) { console.error(e); }
        }
        function signInWithGoogle() {
            const btn = document.getElementById('googleSignInBtn') || document.getElementById('googleSignUpBtn');
            if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...'; btn.disabled = true; }
            if (typeof google === 'undefined' || !google.accounts) { setTimeout(() => signInWithGoogle(), 500); return; }
            if (!googleInitialized && googleClientId) initGoogleSDK();
            google.accounts.id.prompt((notification) => { if (notification && notification.isDismissedMoment()) resetGoogleButton(btn); });
            setTimeout(() => { if (btn && btn.disabled) resetGoogleButton(btn); }, 2000);
        }
        function resetGoogleButton(btn) { if (btn) { btn.innerHTML = '<i class="fab fa-google text-blue-500"></i> ' + (authMode === 'login' ? 'Sign in with Google' : 'Sign up with Google'); btn.disabled = false; } }
        function handleGoogleLogin(response) {
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                const user = { id: 'google_' + payload.sub, name: payload.name, email: payload.email, picture: payload.picture, type: 'google', status: 'Active', adsWatched: 0 };
                db.ref('users/' + user.id).update(user).then(() => { currentUser = user; setLoggedIn(); }).catch(() => { currentUser = user; setLoggedIn(); });
            } catch(e) { alert('Login failed!'); }
        }
        function signUpWithEmail() {
            const name = document.getElementById('signupName')?.value.trim();
            const email = document.getElementById('signupEmail')?.value.trim();
            const password = document.getElementById('signupPassword')?.value;
            if (!name || !email || !password) { alert('Fill all fields!'); return; }
            db.ref('users').once('value').then(snap => {
                const users = snap.val() || {};
                let exists = Object.values(users).some(u => u.email === email);
                if (exists) { alert('Email exists!'); return; }
                const id = 'email_' + Date.now();
                const user = { id, name, email, password, picture: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name), type: 'email', status: 'Active', adsWatched: 0 };
                db.ref('users/' + id).set(user).then(() => { alert('Account created!'); switchAuthMode('login'); });
            });
        }
        function loginWithEmail() {
            const email = document.getElementById('loginEmail')?.value.trim();
            const password = document.getElementById('loginPassword')?.value;
            if (!email || !password) { alert('Enter email/password!'); return; }
            db.ref('users').once('value').then(snap => {
                const users = snap.val() || {};
                let found = Object.values(users).find(u => u.email === email && u.password === password);
                if (found) { currentUser = found; setLoggedIn(); } else { alert('Invalid!'); }
            });
        }
        function loadTelegramUser() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready(); Telegram.WebApp.expand();
                const user = Telegram.WebApp.initDataUnsafe.user;
                if (user) {
                    const telegramUser = { id: 'tg_' + user.id, name: user.first_name + (user.last_name ? ' ' + user.last_name : ''), picture: user.photo_url || 'https://telegram.org/img/t_logo.png', type: 'telegram', status: 'Active', adsWatched: 0 };
                    db.ref('users/' + telegramUser.id).update(telegramUser);
                    currentUser = telegramUser;
                    setLoggedIn();
                    return;
                }
            }
            renderAuthUI();
        }
        function setLoggedIn() {
            document.getElementById('appName').textContent = currentUser.name;
            document.getElementById('telegramPhoto').src = currentUser.picture || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(currentUser.name);
            document.getElementById('loginType').textContent = 'Welcome back';
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('categoryContainer').classList.remove('hidden');
            document.getElementById('videosContainer').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            renderVideos();
        }
        function logout() {
            currentUser = null;
            document.getElementById('appName').textContent = 'VideoStream';
            document.getElementById('telegramPhoto').src = 'https://telegram.org/img/t_logo.png';
            document.getElementById('loginType').textContent = 'Welcome';
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('categoryContainer').classList.add('hidden');
            document.getElementById('videosContainer').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            authMode = 'login'; renderAuthUI();
        }
        
        // ============================================
        // VIDEO DATA LOADING
        // ============================================
        function loadVideosRealtime() {
            db.ref('links').on('value', snap => {
                const data = snap.val() || {};
                videos = Object.values(data);
                if (currentUser) renderVideos();
            });
        }
        function loadCategoriesRealtime() {
            db.ref('categories').on('value', snap => {
                categories = snap.val() || ['Movies', 'Music', 'Sports', 'Gaming'];
                renderCategoryButtons();
            });
        }
        function renderCategoryButtons() {
            const container = document.getElementById('categoryContainer');
            let html = `<button class="cat-btn ${currentCategory === 'all' ? 'active bg-blue-600 text-white' : 'bg-gray-800 text-gray-300'} px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap" data-cat="all">All Videos</button>`;
            categories.forEach(cat => { html += `<button class="cat-btn ${currentCategory === cat ? 'active bg-blue-600 text-white' : 'bg-gray-800 text-gray-300'} px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap" data-cat="${cat}">${cat}</button>`; });
            container.innerHTML = html;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.addEventListener('click', function() { currentCategory = this.dataset.cat; renderCategoryButtons(); renderVideos(); }));
        }
        
        // ============================================
        // RENDER VIDEOS (2-COLUMN GRID)
        // ============================================
        function renderVideos() {
            if (!currentUser) return;
            const filtered = currentCategory === 'all' ? videos : videos.filter(v => v.category === currentCategory);
            const container = document.getElementById('videosContainer');
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-12 text-gray-500"><i class="fas fa-video text-5xl mb-3 opacity-30"></i><p>No videos available</p></div>`;
                return;
            }
            
            container.innerHTML = filtered.map(video => `
                <div class="video-card" onclick="playVideo('${video.id}')">
                    <div class="video-thumbnail">
                        <img src="${video.imageUrl}" alt="${video.title}" onerror="this.src='https://placehold.co/300x200/1a1a2e/fff?text=Video'">
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="p-2">
                        <h3 class="text-white text-sm font-medium truncate">${video.title}</h3>
                        <p class="text-gray-400 text-xs mt-1"><i class="fas fa-eye mr-1"></i>${video.views || 0}</p>
                    </div>
                </div>
            `).join('');
        }
        
        // ============================================
        // 🔥 SMART VIDEO PLAYER (MULTI-PLATFORM)
        // ============================================
        function playVideo(videoId) {
            const video = videos.find(v => v.id === videoId);
            if (!video) return;
            
            // Increment view count
            db.ref('links/' + videoId + '/views').set(firebase.database.ServerValue.increment(1));
            
            // 1. Trigger Monetag Ad
            try { if (typeof show_9955574 === 'function') show_9955574(); } catch(e) { console.log('Monetag ad error'); }
            
            // 2. Build Smart Player based on URL
            const url = video.videoUrl;
            let playerHtml = '';
            
            // YouTube
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let id = "";
                try {
                    if (url.includes("shorts")) {
                        id = url.split("/shorts/")[1].split("?")[0];
                    } else if (url.includes("youtu.be")) {
                        id = url.split("/").pop().split("?")[0];
                    } else {
                        id = url.split("v=")[1]?.split("&")[0];
                    }
                } catch(e) { console.log('YouTube ID extraction failed'); }
                
                if (id) {
                    playerHtml = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    playerHtml = `<p class="text-white p-4">Invalid YouTube URL</p>`;
                }
            }
            
            // TikTok
            else if (url.includes("tiktok.com")) {
                playerHtml = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            }
            
            // Terabox
            else if (url.includes("terabox.com")) {
                playerHtml = `<iframe src="${url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            }
            
            // Telegram
            else if (url.includes("t.me")) {
                playerHtml = `<iframe src="${url}?embed=1" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            }
            
            // Default MP4
            else {
                playerHtml = `<video width="100%" height="100%" controls autoplay><source src="${url}" type="video/mp4"></video>`;
            }
            
            // 3. Inject Player into Modal
            const playerModal = `
                <div id="customVideoPlayer" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999;">
                    <!-- Ad Video Layer -->
                    <div id="adLayer" style="position:absolute; top:0; left:0; width:100%; height:100%;">
                        <video id="adVideo" width="100%" height="100%" autoplay muted playsinline>
                            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                        </video>
                        <button id="skipAdBtn" onclick="skipAd()" style="position:absolute; bottom:80px; right:20px; background:rgba(0,0,0,0.7); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; display:none; z-index:10;">
                            Skip Ad <span id="adTimer">10</span>s
                        </button>
                    </div>
                    
                    <!-- Main Content Layer -->
                    <div id="mainVideo" style="display:none; width:100%; height:100%;">
                        ${playerHtml}
                    </div>
                    
                    <!-- Close Button -->
                    <button onclick="closePlayer()" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.5); color:white; border:none; width:40px; height:40px; border-radius:50%; font-size:20px; z-index:20;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', playerModal);
            
            // Ad Timer Logic
            const adVideo = document.getElementById('adVideo');
            const skipBtn = document.getElementById('skipAdBtn');
            const timerSpan = document.getElementById('adTimer');
            let secondsLeft = 10;
            
            const interval = setInterval(() => {
                secondsLeft--;
                if (timerSpan) timerSpan.textContent = secondsLeft;
                
                if (secondsLeft <= 0) {
                    clearInterval(interval);
                    if (skipBtn) skipBtn.style.display = 'block';
                    if (timerSpan) timerSpan.textContent = '0';
                }
            }, 1000);
            
            setTimeout(() => {
                if (document.getElementById('adLayer')) skipAd();
            }, 10000);
            
            window._adInterval = interval;
        }
        
        function skipAd() {
            if (window._adInterval) clearInterval(window._adInterval);
            
            const adLayer = document.getElementById('adLayer');
            const mainVideo = document.getElementById('mainVideo');
            const adVideo = document.getElementById('adVideo');
            
            if (adLayer && mainVideo) {
                adLayer.style.display = 'none';
                mainVideo.style.display = 'block';
                if (adVideo) adVideo.pause();
                // No .play() call needed; iframes and video tags with autoplay will handle it.
            }
        }
        
        function closePlayer() {
            if (window._adInterval) clearInterval(window._adInterval);
            const player = document.getElementById('customVideoPlayer');
            if (player) player.remove();
        }
        
        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadGoogleClientId();
            loadVideosRealtime();
            loadCategoriesRealtime();
            loadTelegramUser();
        });
        
        // Global functions
        window.switchAuthMode = switchAuthMode;
        window.signUpWithEmail = signUpWithEmail;
        window.loginWithEmail = loginWithEmail;
        window.signInWithGoogle = signInWithGoogle;
        window.logout = logout;
        window.playVideo = playVideo;
        window.skipAd = skipAd;
        window.closePlayer = closePlayer;
    </script>
</body>
</html>
